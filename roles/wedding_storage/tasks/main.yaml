- name: Create mount point directories
  become: true
  ansible.builtin.file:  
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop: "{{ nfs_mounts }}"

- name: Mount NFS shares and add to fstab
  become: true
  ansible.builtin.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: nfs
    opts: "{{ nfs_options | join(',') }}"
    state: present
  loop: "{{ nfs_mounts }}"