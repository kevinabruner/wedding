- name: Sync files from github directory to web
  ansible.builtin.synchronize:
    src: "{{ git_dir }}/html/"
    dest: "{{ web_dir }}/"
    delete: false
    recursive: true
  become: yes

- name: Set permissions for /var/www/html
  ansible.builtin.file:
    path: "{{ web_dir }}"
    mode: "0755"
    recurse: yes
  become: yes

- name: Delete /var/www/html/index.html
  ansible.builtin.file:
    path: /var/www/html/index.html
    state: absent
  become: yes
